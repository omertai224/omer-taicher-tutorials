<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עומר טייכר | הדרכות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&subset=hebrew&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik', sans-serif; background: #0f2a3a; color: white; min-height: 100vh; padding: 40px 24px; }
    .wrap { max-width: 700px; margin: 0 auto; }

    header { margin-bottom: 36px; }
    .name { font-size: 20px; font-weight: 700; }
    .sub { font-size: 13px; color: #a8c5d6; margin-top: 2px; }

    h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
    h1 span { color: #f6a67e; }
    .intro { font-size: 14px; color: #a8c5d6; margin-bottom: 28px; }

    .list { display: flex; flex-direction: column; gap: 10px; }

    .item {
      background: #122333;
      border: 1px solid #1e5f7444;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
      position: relative;
    }
    .item:hover { border-color: #5b8fa8; }

    .item-main {
      flex: 1;
      text-decoration: none;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .item-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #1a4a6b, #1e5f74);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .item-title { font-size: 14px; font-weight: 600; }
    .item-meta { font-size: 12px; color: #5b8fa8; margin-top: 2px; }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #5b8fa8;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .btn:hover { background: #1e5f7433; color: #a8c5d6; }

    /* tooltip */
    .btn::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%; transform: translateX(-50%);
      background: #0f2a3a;
      border: 1px solid #1e5f74;
      color: white;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      font-family: 'Rubik', sans-serif;
    }
    .btn:hover::after { opacity: 1; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%; transform: translateX(-50%);
      background: #1e5f74;
      color: white;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-family: 'Rubik', sans-serif;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    .divider {
      width: 1px; height: 24px;
      background: #1e5f7444;
      margin: 0 2px;
    }

    .open-btn {
      background: linear-gradient(135deg, #1e5f74, #5b8fa8);
      color: white;
      width: auto;
      padding: 0 14px;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      height: 34px;
    }
    .open-btn:hover { background: linear-gradient(135deg, #5b8fa8, #1e5f74); color: white; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="name">עומר טייכר</div>
      <div class="sub">מדריך וטכנאי מחשבים</div>
    </header>

    <h1>הדרכות <span>אינטראקטיביות</span></h1>
    <div class="intro">לחצו על הדרכה כדי להתחיל</div>

    <div class="list" id="list">טוען...</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BASE = window.location.origin + window.location.pathname.replace('index.html','').replace(/\/$/, '');

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function copyLink(url) {
      const full = BASE + '/' + url.replace('./', '');
      navigator.clipboard.writeText(full);
      showToast('הקישור הועתק');
    }

    function shareWhatsApp(title, url) {
      const full = BASE + '/' + url.replace('./', '');
      const msg = encodeURIComponent('הדרכה: ' + title + '\n' + full);
      window.open('https://wa.me/?text=' + msg, '_blank');
    }

    function openLink(url) {
      window.open(url, '_blank');
    }

    fetch('./tutorials.json')
      .then(r => r.json())
      .then(tutorials => {
        const list = document.getElementById('list');
        list.innerHTML = tutorials.map(t => `
          <div class="item">
            <a class="item-main" href="${t.url}" target="_blank">
              <div class="item-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
                </svg>
              </div>
              <div>
                <div class="item-title">${t.title}</div>
                <div class="item-meta">${t.steps} שלבים · ${t.desc}</div>
              </div>
            </a>

            <div class="item-actions">
              <!-- העתק קישור -->
              <button class="btn" data-tip="העתק קישור" onclick="copyLink('${t.url}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
              </button>

              <!-- שלח בוואטסאפ -->
              <button class="btn" data-tip="שלח בוואטסאפ" onclick="shareWhatsApp('${t.title}', '${t.url}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                </svg>
              </button>

              <div class="divider"></div>

              <!-- פתח -->
              <button class="btn open-btn" data-tip="פתח הדרכה" onclick="openLink('${t.url}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
                פתח
              </button>
            </div>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
