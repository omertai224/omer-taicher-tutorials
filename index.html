<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עומר טייכר | הדרכות אינטראקטיביות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&subset=hebrew&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik', sans-serif; background: #0f2a3a; color: white; min-height: 100vh; padding: 48px 24px; }
    .wrap { max-width: 640px; margin: 0 auto; }
    header { margin-bottom: 40px; }
    .name { font-size: 20px; font-weight: 700; }
    .sub { font-size: 13px; color: #a8c5d6; margin-top: 2px; }
    h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    h1 span { color: #f6a67e; }
    .intro { font-size: 14px; color: #a8c5d6; margin-bottom: 32px; }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .item { display: flex; align-items: center; justify-content: space-between; background: #122333; border: 1px solid #1e5f7444; border-radius: 12px; padding: 16px 20px; text-decoration: none; color: white; transition: border-color 0.2s, background 0.2s; }
    .item:hover { border-color: #5b8fa8; background: #1a3244; }
    .item-title { font-size: 15px; font-weight: 600; }
    .item-steps { font-size: 12px; color: #5b8fa8; margin-top: 3px; }
    .item-arrow { color: #5b8fa8; transition: transform 0.2s; }
    .item:hover .item-arrow { transform: translateX(-4px); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="name">עומר טייכר</div>
      <div class="sub">מדריך וטכנאי מחשבים</div>
    </header>
    <h1>הדרכות <span>אינטראקטיביות</span></h1>
    <div class="intro">לחצו על הדרכה כדי להתחיל</div>
    <div class="list">
      <a class="item" href="./vibe/index.html">
        <div>
          <div class="item-title">התקנת Vibe ותמלול בעברית</div>
          <div class="item-steps">24 שלבים</div>
        </div>
        <svg class="item-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
    </div>
  </div>
</body>
</html>
